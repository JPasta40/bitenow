<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RushPlate — Fastest & Cheapest Eats</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { content: ["*"] };
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .glass-card {
      background: rgba(255,255,255,0.09);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 15px 35px -10px rgba(0,0,0,0.5);
      transition: all 0.3s ease;
    }
    .glass-card:hover { transform: translateY(-8px); }
    .glass-btn { 
      background: linear-gradient(145deg, #ef4444, #b91c1c); 
    }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen pb-20">

  <!-- Header -->
  <div class="bg-black sticky top-0 z-50 border-b border-red-900/50">
    <div class="max-w-2xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="rushplate-logo.png" alt="RushPlate" class="w-12 h-12 rounded-2xl shadow-2xl">
        <h1 class="text-4xl font-bold tracking-tighter">RushPlate</h1>
      </div>
      <button onclick="getLiveLocation()" 
              class="glass-btn text-white px-6 py-3 rounded-3xl text-sm font-semibold flex items-center gap-2">
        <i class="fa-solid fa-location-dot"></i>
        <span id="location-text">Providence, RI</span>
      </button>
    </div>
  </div>

  <div class="max-w-2xl mx-auto px-4 pt-8">
    <div id="results" class="space-y-6"></div>
  </div>

  <script>
    async function getLiveLocation() {
      const btn = document.getElementById("location-text");
      const resultsDiv = document.getElementById('results');

      btn.textContent = "Finding eats...";
      resultsDiv.innerHTML = `<p class="text-center py-12 text-zinc-400">Searching for real restaurants nearby...</p>`;

      try {
        const res = await fetch('/api/places?lat=41.8240&lon=-71.4128');
        const data = await res.json();

        if (data.status === "OK") {
          renderResults(data.results);
        } else {
          resultsDiv.innerHTML = `<p class="text-red-400 text-center">Error: ${data.error || data.status}</p>`;
        }
      } catch (e) {
        console.error(e);
        resultsDiv.innerHTML = `<p class="text-red-400 text-center">Could not connect to server.<br>Please try again.</p>`;
      }
    }

    function renderResults(places) {
      const div = document.getElementById('results');
      div.innerHTML = `<h2 class="text-2xl font-bold mb-6 text-center">Restaurants near you</h2>`;

      places.slice(0, 10).forEach(place => {
        const html = `
          <div class="glass-card rounded-3xl overflow-hidden p-6">
            <h3 class="text-xl font-semibold">${place.name}</h3>
            <p class="text-zinc-400">${place.vicinity || 'Providence, RI'}</p>
            ${place.rating ? `<p class="text-amber-400">${place.rating} ★</p>` : ''}
            <button onclick="orderNow('${place.name}')" 
                    class="mt-6 w-full py-4 glass-btn rounded-2xl font-medium">
              Order Now
            </button>
          </div>`;
        div.innerHTML += html;
      });
    }

    function orderNow(name) {
      const q = encodeURIComponent(name + " Providence RI");
      window.open(`https://www.doordash.com/search/?q=${q}`, '_blank');
      window.open(`https://www.ubereats.com/search?q=${q}`, '_blank');
    }

    // Initial message
    window.onload = () => {
      document.getElementById('results').innerHTML = `
        <p class="text-center py-12 text-zinc-400">
          Click the location button to find real eats near you.
        </p>`;
    };
  </script>
</body>
</html>
