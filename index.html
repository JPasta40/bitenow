<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RushPlate — Fastest & Cheapest Eats</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { content: ["*"] };
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .glass-card {
      background: rgba(255,255,255,0.09);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 15px 35px -10px rgba(0,0,0,0.5);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .glass-card:hover { transform: translateY(-8px); }
    .glass-btn { background: linear-gradient(145deg, #ef4444, #b91c1c); }
    .header-text { font-size: 2.25rem; font-weight: 700; letter-spacing: -0.04em; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen pb-20">

  <!-- Header -->
  <div class="bg-black sticky top-0 z-50 border-b border-red-900/50">
    <div class="max-w-2xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="rushplate-logo.png" alt="RushPlate" class="w-12 h-12 rounded-2xl shadow-2xl">
        <h1 class="header-text tracking-tighter">RushPlate</h1>
      </div>
      <div class="flex items-center gap-4">
        <div id="clock" class="text-sm font-mono text-zinc-400"></div>
        <button onclick="getLiveLocation()" 
                class="glass-btn text-white px-6 py-3 rounded-3xl text-sm font-semibold flex items-center gap-2">
          <i class="fa-solid fa-location-dot"></i>
          <span id="location-text">Providence, RI</span>
        </button>
      </div>
    </div>
  </div>

  <div class="max-w-2xl mx-auto px-4 pt-8">
    <div id="results" class="space-y-6"></div>
    <div class="text-center text-xs text-zinc-500 mt-20 mb-12">
      <a href="privacy.html" class="hover:text-red-400">Privacy Policy</a>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <div class="fixed bottom-0 left-0 right-0 bg-black/90 backdrop-blur-lg border-t border-white/10 max-w-2xl mx-auto">
    <div class="grid grid-cols-5 py-4 text-xs text-center">
      <div onclick="switchTab(0)" class="text-red-500"><i class="fa-solid fa-house fa-2xl"></i><br>Home</div>
      <div onclick="switchTab(1)"><i class="fa-solid fa-fire fa-2xl"></i><br>Viral</div>
      <div onclick="switchTab(2)" class="text-red-500"><i class="fa-solid fa-utensils fa-2xl"></i><br>Try Cooking</div>
      <div><i class="fa-solid fa-clock fa-2xl"></i><br>Orders</div>
      <div onclick="toggleUserModal()"><i class="fa-solid fa-user fa-2xl"></i><br>Me</div>
    </div>
  </div>

  <script>
    // Live EST Clock
    function updateClock() {
      const now = new Date().toLocaleString("en-US", { timeZone: "America/New_York" });
      document.getElementById("clock").innerHTML = now.slice(10, 19) + " EST";
    }
    setInterval(updateClock, 1000);
    updateClock();

    async function getLiveLocation() {
      if (!navigator.geolocation) return alert("Location not supported");

      const btn = document.getElementById("location-text");
      btn.textContent = "Finding real eats...";

      try {
        const res = await fetch(`/api/places?lat=41.8240&lon=-71.4128`);
        const data = await res.json();

        if (data.status === "OK") {
          renderGoogleResults(data.results);
        } else {
          document.getElementById('results').innerHTML = `<p class="text-red-400 text-center">Google API error: ${data.error || data.status}</p>`;
        }
      } catch (e) {
        console.error(e);
        document.getElementById('results').innerHTML = `<p class="text-red-400 text-center">Could not connect to server. Using demo data.</p>`;
      }
    }

    function renderGoogleResults(places) {
      const container = document.getElementById('results');
      container.innerHTML = `<h2 class="text-2xl font-bold mb-6 text-center">Restaurants near you</h2>`;

      places.slice(0, 10).forEach(place => {
        const html = `
          <div class="glass-card rounded-3xl overflow-hidden">
            <div class="p-6">
              <h4 class="text-2xl font-semibold">${place.name}</h4>
              <p class="text-zinc-400">${place.vicinity || 'Providence, RI'}</p>
              <p class="text-amber-400">${place.rating ? place.rating + ' ★' : ''}</p>
              <div class="mt-6 flex gap-3">
                <button onclick="orderNow('${place.name}')" class="flex-1 glass-btn py-4 rounded-2xl font-medium">Order Now</button>
              </div>
            </div>
          </div>`;
        container.innerHTML += html;
      });
    }

    function orderNow(name) {
      const q = encodeURIComponent(name + " Providence RI");
      window.open(`https://www.doordash.com/search/?q=${q}`, '_blank');
      window.open(`https://www.ubereats.com/search?q=${q}`, '_blank');
    }

    function switchTab(tab) {
      if (tab === 2) alert("Try Cooking It Yourself modal coming in next update.");
    }

    function toggleUserModal() {
      alert("Favorites saved locally.");
    }

    // Initial load
    window.onload = () => {
      document.getElementById('results').innerHTML = `<p class="text-center text-zinc-400 py-12">Click the location button to find real eats nearby.</p>`;
    };
  </script>
</body>
</html>
