<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RushPlate — Fastest & Cheapest Eats</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { content: ["*"] };
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .glass-card {
      background: rgba(255,255,255,0.09);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 15px 35px -10px rgba(0,0,0,0.5);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .glass-card:hover { 
      transform: translateY(-10px) scale(1.02); 
      box-shadow: 0 25px 60px -15px rgba(239,68,68,0.35); 
    }
    .glass-btn { 
      background: linear-gradient(145deg, #ef4444, #b91c1c); 
      transition: all 0.3s ease;
    }
    .glass-btn:hover { transform: scale(1.05); }
    .header-text { 
      font-size: 2.25rem; 
      font-weight: 700; 
      letter-spacing: -0.04em; 
    }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen pb-20">

  <!-- Header -->
  <div class="bg-black sticky top-0 z-50 border-b border-red-900/50">
    <div class="max-w-2xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="rushplate-logo.png" alt="RushPlate" class="w-12 h-12 rounded-2xl shadow-2xl">
        <h1 class="header-text tracking-tighter">RushPlate</h1>
      </div>
      <div class="flex items-center gap-4">
        <div id="clock" class="text-sm font-mono text-zinc-400"></div>
        <button onclick="getLiveLocation()" 
                class="glass-btn text-white px-6 py-3 rounded-3xl text-sm font-semibold flex items-center gap-2">
          <i class="fa-solid fa-location-dot"></i>
          <span id="location-text">Providence, RI</span>
        </button>
      </div>
    </div>
  </div>

  <div class="max-w-2xl mx-auto px-4 pt-8">
    <div id="results" class="space-y-6"></div>

    <div class="text-center text-xs text-zinc-500 mt-20 mb-12">
      <a href="privacy.html" class="hover:text-red-400">Privacy Policy</a>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <div class="fixed bottom-0 left-0 right-0 bg-black/90 backdrop-blur-lg border-t border-white/10 max-w-2xl mx-auto">
    <div class="grid grid-cols-5 py-4 text-xs text-center">
      <div onclick="switchTab(0)" class="text-red-500"><i class="fa-solid fa-house fa-2xl"></i><br>Home</div>
      <div onclick="switchTab(1)"><i class="fa-solid fa-fire fa-2xl"></i><br>Viral</div>
      <div onclick="switchTab(2)" class="text
