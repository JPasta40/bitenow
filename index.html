<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RushPlate — Fastest & Cheapest Eats</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; }
    .glass-card {
      background: rgba(255,255,255,0.09);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      box-shadow: 0 15px 35px -10px rgba(0,0,0,0.5);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .glass-card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 25px 60px -15px rgba(239,68,68,0.35); }
    .glass-btn { background: linear-gradient(145deg, #ef4444, #b91c1c); }
    .hero-text { background: linear-gradient(90deg, #fff, #f3f4f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen pb-20">

  <!-- Header -->
  <div class="bg-black sticky top-0 z-50 border-b border-red-900/50">
    <div class="max-w-2xl mx-auto px-6 py-5 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <img src="rushplate-logo.png" alt="RushPlate" class="w-11 h-11 rounded-2xl shadow-xl">
        <h1 class="text-3xl font-bold tracking-tighter hero-text">RushPlate</h1>
      </div>
      <button onclick="getLiveLocation()" class="glass-btn text-white px-6 py-3 rounded-3xl text-sm font-semibold flex items-center gap-2">
        <i class="fa-solid fa-location-dot"></i>
        <span id="location-text">Providence, RI</span>
      </button>
    </div>
  </div>

  <div class="max-w-2xl mx-auto px-4 pt-8">

    <!-- Rush Radar -->
    <div class="glass-card rounded-3xl p-6 mb-8 text-center">
      <p class="text-red-400 text-sm font-medium tracking-widest">RUSH RADAR</p>
      <h2 class="text-4xl font-bold mt-2">Fastest bite right now</h2>
      <div id="radar" class="mt-6 text-2xl font-semibold text-red-400">Loading best deal...</div>
    </div>

    <!-- Meal Toggle -->
    <div class="flex gap-3 mb-10">
      <button onclick="setMealType('lunch')" id="lunch-btn" class="flex-1 py-4 rounded-3xl font-semibold text-lg glass-btn">🍔 Lunch Now</button>
      <button onclick="setMealType('dinner')" id="dinner-btn" class="flex-1 py-4 rounded-3xl font-semibold text-lg bg-zinc-900 border border-white/10">🍝 Dinner</button>
    </div>

    <div id="results" class="space-y-6"></div>

    <div class="text-center text-xs text-zinc-500 mt-20 mb-12">
      <a href="privacy.html" class="hover:text-red-400">Privacy Policy</a>
    </div>
  </div>

  <!-- Bottom Navigation -->
  <div class="fixed bottom-0 left-0 right-0 bg-black/90 backdrop-blur-lg border-t border-white/10 max-w-2xl mx-auto">
    <div class="grid grid-cols-5 py-4 text-xs text-center">
      <div onclick="switchTab(0)" class="text-red-500"><i class="fa-solid fa-house fa-2xl"></i><br>Home</div>
      <div onclick="switchTab(1)"><i class="fa-solid fa-fire fa-2xl"></i><br>Viral</div>
      <div onclick="switchTab(2)" class="text-red-500"><i class="fa-solid fa-utensils fa-2xl"></i><br>Make It</div>
      <div><i class="fa-solid fa-clock fa-2xl"></i><br>Orders</div>
      <div onclick="toggleUserModal()"><i class="fa-solid fa-user fa-2xl"></i><br>Me</div>
    </div>
  </div>

  <!-- Menu Modal -->
  <div id="menu-modal" class="hidden fixed inset-0 bg-black/80 flex items-end z-50" onclick="if(event.target===this) hideMenuModal()">
    <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 w-full rounded-t-3xl max-h-[85vh] overflow-auto p-6">
      <div id="menu-content"></div>
    </div>
  </div>

  <!-- Make It Yourself Modal -->
  <div id="diy-modal" class="hidden fixed inset-0 bg-black/80 flex items-end z-50" onclick="if(event.target===this) hideDiyModal()">
    <div onclick="event.stopImmediatePropagation()" class="bg-zinc-900 w-full rounded-t-3xl max-h-[85vh] overflow-auto p-6">
      <div id="diy-content"></div>
    </div>
  </div>

  <script>
    const apiKey = "91ed2a3ad389497da600fc593f7a4596";

    let restaurants = {
      lunch: [
        { id: 1, name: "Chipotle", cuisine: "Mexican", dist: "0.4", price: 9, wait: 7, rating: "4.6",
          thumbnail: "https://picsum.photos/id/1015/600/300",
          reviewLink: "https://www.instagram.com/reel/C8xYkL2pQjK/",
          menu: [
            {name: "Chicken Burrito Bowl", price: 9.25, description: "White rice, black beans, grilled chicken, fresh salsa, cheese, guacamole"},
            {name: "Steak Tacos (3)", price: 9.75, description: "Corn tortillas, grilled steak, cilantro, onion, lime"}
          ]
        },
        { id: 2, name: "Shake Shack", cuisine: "Burgers", dist: "1.8", price: 11, wait: 12, rating: "4.7",
          thumbnail: "https://picsum.photos/id/201/600/300",
          reviewLink: "https://www.instagram.com/reel/D2vPqR9mN8L/",
          menu: [
            {name: "Cheeseburger", price: 8.99, description: "Beef patty, American cheese, pickles, special sauce"},
            {name: "Crispy Chicken Sandwich", price: 9.49, description: "Buttermilk fried chicken, pickles, lettuce"}
          ]
        }
      ],
      dinner: [
        { id: 3, name: "Federal Hill Pizza", cuisine: "Italian", dist: "1.1", price: 12, wait: 14, rating: "4.8",
          thumbnail: "https://picsum.photos/id/251/600/300",
          reviewLink: "https://www.instagram.com/reel/C9kLmPqRtYv/",
          menu: [
            {name: "Margherita Pizza", price: 11.99, description: "San Marzano tomato sauce, fresh mozzarella, basil"},
            {name: "Pepperoni Pizza", price: 13.49, description: "Classic pepperoni, mozzarella"}
          ]
        },
        { id: 4, name: "Pho 75", cuisine: "Vietnamese", dist: "1.3", price: 10, wait: 10, rating: "4.6",
          thumbnail: "https://picsum.photos/id/301/600/300",
          reviewLink: "https://www.instagram.com/reel/D1mNqRtYvPq/",
          menu: [
            {name: "Beef Pho", price: 10.99, description: "Rice noodles, brisket, herbs, bean sprouts"},
            {name: "Chicken Spring Rolls", price: 7.50, description: "Fresh rolls with peanut dipping sauce"}
          ]
        }
      ]
    };

    let currentType = 'lunch';
    let userFavorites = [];

    function loadFavorites() {
      try {
        const saved = localStorage.getItem('rushplateFavorites');
        if (saved) userFavorites = JSON.parse(saved);
      } catch (e) {}
    }

    function saveFavorites() {
      try { localStorage.setItem('rushplateFavorites', JSON.stringify(userFavorites)); } catch (e) {}
    }

    function renderResults() {
      const container = document.getElementById('results');
      container.innerHTML = '';
      const list = restaurants[currentType] || [];
      list.forEach(r => {
        const html = `
          <div class="glass-card rounded-3xl overflow-hidden">
            <img src="${r.thumbnail}" class="w-full h-48 object-cover">
            <div class="p-6">
              <div class="flex justify-between items-start">
                <div>
                  <h4 class="text-2xl font-semibold">${r.name}</h4>
                  <p class="text-zinc-400">${r.cuisine} • ${r.dist} mi</p>
                </div>
                <span onclick="toggleFavorite(${r.id}); event.stopImmediatePropagation()" class="text-3xl cursor-pointer">❤️</span>
              </div>
              <div class="flex gap-6 mt-4 text-sm">
                <div><i class="fa-solid fa-dollar-sign text-red-500"></i> $${r.price}</div>
                <div><i class="fa-solid fa-clock text-red-500"></i> ${r.wait} min</div>
              </div>
              <div class="mt-6 flex gap-3">
                <button onclick="showMenu(${r.id})" class="flex-1 border border-white/20 py-4 rounded-2xl font-medium">View Menu</button>
                <button onclick="orderNow('${r.name}')" class="flex-1 glass-btn text-white py-4 rounded-2xl font-medium">Order Now</button>
              </div>
              <a href="${r.reviewLink}" target="_blank" class="block mt-4 text-xs text-red-400 hover:text-red-300">See highest-viewed Instagram reel →</a>
            </div>
          </div>`;
        container.innerHTML += html;
      });
    }

    function showMenu(id) {
      const r = [...restaurants.lunch, ...restaurants.dinner].find(x => x.id === id);
      let html = `<h2 class="text-3xl font-bold mb-6">${r.name} Menu</h2>`;
      r.menu.forEach(item => {
        html += `
          <div class="glass-card p-5 rounded-3xl mb-4">
            <div class="flex justify-between">
              <div>
                <h4 class="font-semibold">${item.name}</h4>
                <p class="text-zinc-400 text-sm">${item.description}</p>
              </div>
              <div class="text-right">
                <span class="font-medium">$${item.price}</span><br>
                <button onclick="showDiyFor('${item.name}', '${r.name}'); hideMenuModal()" class="text-xs text-red-400 mt-2">Make It Yourself</button>
              </div>
            </div>
          </div>`;
      });
      document.getElementById('menu-content').innerHTML = html;
      document.getElementById('menu-modal').classList.remove('hidden');
    }

    function hideMenuModal() {
      document.getElementById('menu-modal').classList.add('hidden');
    }

    function showDiyFor(itemName, restaurantName) {
      hideMenuModal();
      const content = document.getElementById('diy-content');
      content.innerHTML = `
        <h2 class="text-3xl font-bold mb-4">Make ${itemName} at Home</h2>
        <p class="text-zinc-400 mb-6">Inspired by ${restaurantName}</p>
        <div class="glass-card p-6 rounded-3xl mb-6">
          <h4 class="font-semibold mb-3">Ingredients</h4>
          <p class="text-zinc-300">• Protein or base<br>• Fresh vegetables<br>• Sauce or seasoning</p>
        </div>
        <div class="glass-card p-6 rounded-3xl">
          <h4 class="font-semibold mb-3">Instructions</h4>
          <p class="text-zinc-300">1. Prepare base<br>2. Cook protein and vegetables<br>3. Add sauce and toss<br>4. Assemble and serve hot</p>
        </div>
        <button onclick="hideDiyModal()" class="w-full py-5 glass-btn rounded-3xl font-semibold mt-8">Start Cooking</button>
      `;
      document.getElementById('diy-modal').classList.remove('hidden');
    }

    function hideDiyModal() {
      document.getElementById('diy-modal').classList.add('hidden');
    }

    function orderNow(name) {
      window.open(`https://www.doordash.com/search/?q=${encodeURIComponent(name)}+Providence+RI`, '_blank');
    }

    function toggleFavorite(id) {
      if (userFavorites.includes(id)) userFavorites = userFavorites.filter(f => f !== id);
      else userFavorites.push(id);
      saveFavorites();
      renderResults();
    }

    function setMealType(type) {
      currentType = type;
      const lunchBtn = document.getElementById('lunch-btn');
      const dinnerBtn = document.getElementById('dinner-btn');
      if (type === 'lunch') {
        lunchBtn.className = 'flex-1 py-4 rounded-3xl font-semibold text-lg glass-btn';
        dinnerBtn.className = 'flex-1 py-4 rounded-3xl font-semibold text-lg bg-zinc-900 border border-white/10';
      } else {
        lunchBtn.className = 'flex-1 py-4 rounded-3xl font-semibold text-lg bg-zinc-900 border border-white/10';
        dinnerBtn.className = 'flex-1 py-4 rounded-3xl font-semibold text-lg glass-btn';
      }
      renderResults();
    }

    function switchTab(tab) {
      if (tab === 2) showDiyFor("a popular item", "");
    }

    function toggleUserModal() {
      alert("Your favorites are saved locally on this device.");
    }

    window.onload = () => {
      loadFavorites();
      renderResults();
    };
  </script>
</body>
</html>
